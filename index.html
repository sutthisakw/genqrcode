<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>Short → Redirect</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:2rem;line-height:1.6}
    code{background:#f3f3f3;padding:.2rem .4rem;border-radius:.3rem}
  </style>
</head>
<body>
  <h3>Local Short Redirect</h3>
  <p>ใส่รหัสหลัง <code>#</code> เช่น <code>/#form</code></p>

  <script>
    (async () => {
      const code = decodeURIComponent(location.hash.replace(/^#/, ''));
      if (!code) return; // ไม่มีโค้ด → แสดงหน้าเฉยๆ
    
      try {
        // กัน cache ด้วย time param
        const res = await fetch('mapping.json?v=' + Date.now());
        const mapping = await res.json();
    
        const target = mapping[code];
        if (target) {
          location.replace(target);
        } else {
          document.body.insertAdjacentHTML('beforeend',
            `<p style="color:#c00">ไม่พบรหัส: <b>${code}</b></p>`);
        }
      } catch (e) {
        document.body.insertAdjacentHTML('beforeend',
          `<p style="color:#c00">โหลด mapping.json ไม่ได้: ${e}</p>`);
      }
    })();
  </script>
</body>
</html>
